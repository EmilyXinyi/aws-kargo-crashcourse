apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
spec:
  project: default
  syncPolicy:
    automated: {}
  source:
    repoURL: https://github.com/emilyxinyi/aws-kargo-crashcourse.git # REPLACE THIS: the URL of your git repository
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    name: in-cluster
    namespace: argocd